name: release

on:
  push:
    tags:
      - "v*"

# Each job runs only after the previous one succeeds, so a failed test or a
# rejected PyPI upload aborts the rest of the chain (no half-released versions).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build wheel + sdist
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install
        run: uv sync --all-groups

      - name: Tag version matches package version
        # Compare the git tag (vX.Y.Z) against rest_framework_mcp.__version__.
        # Any mismatch is a sign someone tagged without bumping version.py.
        # Parse version.py textually rather than importing — importing the
        # package triggers DRF re-exports that need Django settings
        # configured, which we'd rather not do for a one-shot version check.
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          pkg_version="$(awk -F'"' '/^__version__/ {print $2; exit}' rest_framework_mcp/version.py)"
          if [[ "$tag" != "v$pkg_version" ]]; then
            echo "Tag $tag does not match package version v$pkg_version"
            exit 1
          fi

      - name: Final test gate
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/djangorestframework-mcp-server
    permissions:
      # Required for OIDC trusted publishing — no API token in repo secrets.
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docs:
    name: publish docs to GitHub Pages
    needs: publish-pypi
    runs-on: ubuntu-latest
    # Docs deployment is best-effort: if mkdocs.yml is missing the step is
    # skipped instead of failing the release.
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Check for mkdocs.yml
        id: docs
        run: |
          if [[ -f mkdocs.yml ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "mkdocs.yml not found — skipping docs deploy."
          fi
      - name: Install with docs group
        if: steps.docs.outputs.present == 'true'
        run: uv sync --all-groups
      - name: Configure git for gh-deploy
        if: steps.docs.outputs.present == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
      - name: Deploy to gh-pages
        if: steps.docs.outputs.present == 'true'
        run: |
          DJANGO_SETTINGS_MODULE=tests.conftest_settings \
            uv run mkdocs gh-deploy --force --clean --config-file mkdocs.yml
